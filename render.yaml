services:
  - type: web
    name: datasage-ai-backend
    runtime: java
    rootDir: backend
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/ai-data-analyst-dashboard-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: local
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
